<!-- 即时音频恢复：非音乐页面加载时立即从 sessionStorage 恢复播放 -->
<script>
(function(){
  try{
    if(location.pathname.indexOf('/music/')===0) return;
    var s=JSON.parse(sessionStorage.getItem('music_player_state'));
    if(!s||!s.url||!s.playing) return;
    if(Date.now()-(s.ts||0)>30000) return;
    var a=new Audio();
    a.src=s.url;
    a.currentTime=Math.min((s.currentTime||0)+((Date.now()-(s.ts||0))/1000),s.duration||Infinity);
    a.play().catch(function(){});
    window.__miniAudio=a;
  }catch(e){}
})();
</script>
