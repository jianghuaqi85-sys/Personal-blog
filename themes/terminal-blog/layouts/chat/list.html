{{ define "main" }}
<div class="chat-page">
  <div class="container">
    <h1 class="chat-page__title">
      <span class="prompt">&gt;</span> ssh chat@room
    </h1>
    <p class="chat-page__desc">实时聊天室已连接</p>
  </div>
  <div class="chat-page__embed">
    <!-- 将 src 替换为你的聊天室实际地址 -->
    <iframe
      src="https://your-chat-room-url.com"
      frameborder="0"
      allowfullscreen
      loading="lazy"
      title="聊天室"
    ></iframe>
  </div>
</div>
{{ end }}
